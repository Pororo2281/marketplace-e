spring:
  application:
    name: product-service

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: ${SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

  endpoint:
    health:
      show-details: always

  prometheus:
    metrics:
      export:
        enabled: true

server:
  port: 8082

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
  refresh: ${JWT_REFRESH_SECRET}
  refresh-expiration: 604800000

internal:
  secret-token: ${INTERNAL_SECRET_TOKEN}

rabbitmq:
  queue:
    product: product-service.review.queue