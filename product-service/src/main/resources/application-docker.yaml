spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://product-postgres:5432/product_db}
    username: ${DB_USERNAME:marketplace_user}
    password: ${DB_PASSWORD}

  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD}

services:
  user-service:
    url: ${USER_SERVICE_URL:http://user-service:8081}

minio:
  url: ${MINIO_URL:http://product-minio:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY}
  bucket: ${MINIO_BUCKET:products}