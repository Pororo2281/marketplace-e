server:
  port: 8080
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true

services:
  user-service: ${USER_SERVICE_URL:http://localhost:8081}
  product-service: ${PRODUCT_SERVICE_URL:http://localhost:8082}
  order-service: ${ORDER_SERVICE_URL:http://localhost:8083}
  payment-service: ${PAYMENT_SERVICE_URL:http://localhost:8084}
  admin-service: ${ADMIN_SERVICE_URL:http://localhost:8089}
  review-service: ${REVIEW_SERVICE_URL:http://localhost:8088}
  search-service: ${SEARCH_SERVICE_URL:http://localhost:8086}

app:
  frontend-url: ${FRONTEND_URL:https://digitshop.shop}
  oauth-cookie-secure: ${OAUTH_COOKIE_SECURE:true}

jwt:
  secret: ${JWT_SECRET}
  expiration: 2592000000

spring:
  application:
    name: gateway-service
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
              - openid