name: Deploy Digit Shop

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push user-service
        run: |
          cd user-service
          ./mvnw clean package -DskipTests
          cd ..
          docker buildx build --platform linux/amd64 \
            -t pororo2281/marketplace-global3-user-service:amd64 \
            --push ./user-service

      - name: Build and push product-service
        run: |
          cd product-service
          ./mvnw clean package -DskipTests
          cd ..
          docker buildx build --platform linux/amd64 \
            -t pororo2281/marketplace-global3-product-service:amd64 \
            --push ./product-service

      - name: Build and push order-service
        run: |
          cd order-service
          ./mvnw clean package -DskipTests
          cd ..
          docker buildx build --platform linux/amd64 \
            -t pororo2281/marketplace-global3-order-service:amd64 \
            --push ./order-service

      - name: Build and push payment-service
        run: |
          cd payment-service
          ./mvnw clean package -DskipTests
          cd ..
          docker buildx build --platform linux/amd64 \
            -t pororo2281/marketplace-global3-payment-service:amd64 \
            --push ./payment-service

      - name: Build and push gateway-service
        run: |
          cd "gateway 2"
          ./mvnw clean package -DskipTests
          cd ..
          docker buildx build --platform linux/amd64 \
            -t pororo2281/marketplace-global3-gateway-service:amd64 \
            --push "./gateway 2"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/digit-shop
            docker compose pull
            docker compose up -d
            docker image prune -f
